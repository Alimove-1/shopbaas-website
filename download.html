<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080d;--surface:#0e1117;--surface2:#161b26;--card:#111723;
  --border:rgba(255,255,255,.06);--accent:#6c5ce7;--accent2:#a29bfe;
  --accent-glow:rgba(108,92,231,.35);--green:#00e5a0;--green-glow:rgba(0,229,160,.25);
  --text:#f0f2f8;--muted:#8b93b3;--radius:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;
}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 24px 0;}
.logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:28px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;}

/* Phone mockup */
.phone-glow{position:relative;display:inline-block;margin:28px auto;}
.phone-glow::before{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:320px;height:400px;
  background:radial-gradient(ellipse at center,rgba(108,92,231,.2) 0%,rgba(0,229,160,.08) 40%,transparent 70%);
  filter:blur(40px);z-index:-1;pointer-events:none;
}
.phone-frame{
  position:relative;width:260px;border-radius:36px;
  border:3px solid rgba(255,255,255,.1);overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.05),inset 0 0 20px rgba(0,0,0,.3),0 20px 60px rgba(0,0,0,.5);
}
.phone-frame::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:28px;background:var(--bg);border-radius:0 0 18px 18px;z-index:2;
}
.phone-frame::after{
  content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:100px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;z-index:2;
}
.phone-frame img{width:100%;display:block;}

.headline{font-family:'Outfit',sans-serif;font-weight:800;font-size:clamp(24px,6vw,36px);text-align:center;}
.subline{color:var(--muted);font-size:15px;text-align:center;margin-bottom:28px;}
.platform-label{font-size:14px;color:var(--muted);text-align:center;margin-bottom:12px;}
.buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;}
.btn-app{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:14px 24px;text-decoration:none;color:var(--text);
  transition:border-color .3s, transform .3s, box-shadow .3s;
}
.btn-app:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3);}
.btn-app-icon{font-size:28px;}
.btn-app-text{display:flex;flex-direction:column;line-height:1.2;}
.btn-app-text small{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.btn-app-text strong{font-size:15px;font-weight:600;}
.store-logos{
  display:flex;align-items:center;gap:16px;overflow:hidden;
  mask-image:linear-gradient(90deg,transparent,black 10%,black 90%,transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,black 10%,black 90%,transparent);
  margin-top:32px;width:100%;max-width:500px;
}
.store-logos-track{display:flex;align-items:center;gap:16px;flex-shrink:0;}
.store-logo{
  display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:40px;padding:6px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);opacity:.6;
}
.store-logo img{max-height:24px;max-width:60px;width:auto;height:auto;object-fit:contain;}
.footer{font-size:11px;color:var(--muted);margin-top:auto;padding:24px 0 16px;text-align:center;}
.footer a{color:var(--muted);text-decoration:none;}
.footer a:hover{color:var(--text);}

/* Platform detection */
body.is-ios .android-only{display:none;}
body.is-android .ios-only{display:none;}
body.is-ios .platform-label,body.is-android .platform-label{display:none;}

/* Animations — only when motion is OK */
@media(prefers-reduced-motion:no-preference){
  @keyframes phone-float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
  }
  .phone-frame{animation:phone-float 3s ease-in-out infinite;}

  @keyframes btn-pulse{
    0%,100%{box-shadow:0 4px 20px var(--green-glow);}
    50%{box-shadow:0 8px 40px var(--green-glow),0 0 20px var(--green-glow);}
  }
  body.is-ios .ios-only,
  body.is-android .android-only{
    border-color:var(--green);
    animation:btn-pulse 2s ease-in-out infinite;
  }

  @keyframes fade-up-in{
    to{opacity:1;transform:translateY(0);}
  }
  .fade-up{
    opacity:0;transform:translateY(20px);
    animation:fade-up-in .6s ease-out forwards;
  }

  @keyframes shimmer{
    0%,100%{background-position:100% 0;}
    50%{background-position:-100% 0;}
  }
  .shimmer-text{
    background:linear-gradient(90deg,var(--text) 0%,var(--text) 40%,var(--accent2) 50%,var(--text) 60%,var(--text) 100%);
    background-size:200% 100%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:shimmer 4s ease-in-out infinite;
  }

  @keyframes marquee{
    0%{transform:translate3d(0,0,0);}
    100%{transform:translate3d(-100%,0,0);}
  }
  .store-logos-track{animation:marquee 15s linear infinite;}
}
